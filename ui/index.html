<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPiceZ Nametags</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Panchang';
            src: url('../../spz-poll/ui/public/fonts/Panchang-Bold.ttf') format('truetype');
            font-weight: 700;
        }
        @font-face {
            font-family: 'Panchang';
            src: url('../../spz-poll/ui/public/fonts/Panchang-Regular.ttf') format('truetype');
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div id="self-nametag-container">
        <!-- Self nametag will be injected here -->
    </div>

    <div id="nametag-container">
        <!-- Other nametags will be injected here -->
    </div>

    <div id="editor-screen" style="display:none">
        <div class="editor-modal">
            <div class="editor-header">
                <h1>EDIT NAMETAG</h1>
                <p>Customize your presence on the track</p>
            </div>

            <div class="editor-preview-section">
                <div class="preview-label">LIVE PREVIEW</div>
                <div id="editor-preview-container">
                    <!-- Preview nametag injected here -->
                </div>
            </div>

            <div class="editor-form">
                <div class="input-group">
                    <label>AVATAR URL (PNG/JPG)</label>
                    <input type="text" id="input-avatar" placeholder="https://cdn.discordapp.com/...">
                    <button id="btn-fetch-discord" class="btn-secondary">USE DISCORD AVATAR</button>
                </div>

                <div class="input-group">
                    <label>BANNER URL (PNG/JPG/GIF)</label>
                    <input type="text" id="input-banner" placeholder="https://cdn.discordapp.com/...">
                </div>

                <div class="editor-footer">
                    <button id="btn-cancel" class="btn-danger">CANCEL</button>
                    <button id="btn-save" class="btn-success">SAVE CHANGES</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
