<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPZ · Nametags</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
@font-face { font-family: 'Panchang'; src: url('fonts/Panchang-Variable.ttf') format('truetype'); font-weight: 100 900; }

/* Design tokens — referenced by both this block and style.css */
:root {
  --spz-bg: #07080A; --spz-surface-1: #0E1014; --spz-surface-2: #14171C; --spz-surface-3: #1B1F26;
  --spz-line: rgba(255,255,255,0.07); --spz-line-strong: rgba(255,255,255,0.13);
  --spz-fg-1: #F0F2F5; --spz-fg-2: #A8AEBB; --spz-fg-3: #5C6370; --spz-fg-4: #3A3F4A;
  --spz-orange: #FF6200; --spz-orange-deep: #D14E00;
  --spz-font-display: 'Panchang', 'Inter', sans-serif;
  --spz-font-body: 'Inter', system-ui, sans-serif;
  --spz-font-mono: 'JetBrains Mono', monospace;
  --spz-radius-2: 4px; --spz-radius-3: 6px; --spz-radius-4: 8px; --spz-radius-lg: 12px;
  --spz-shadow-1: 0 1px 3px rgba(0,0,0,0.5);
  --spz-shadow-glow-soft: 0 0 12px rgba(255,98,0,0.25), 0 0 0 1px rgba(255,98,0,0.15);
  --spz-dur-2: 140ms; --spz-ease-out: cubic-bezier(0,0,0.2,1);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;-webkit-font-smoothing:antialiased;font-family:var(--spz-font-body);font-size:13px;}

/* spz-ui component styles needed by the editor */
.spz-eyebrow{font-family:var(--spz-font-mono);font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--spz-fg-3);}
.spz-card-title{font-family:var(--spz-font-display);font-weight:600;font-size:15px;letter-spacing:-0.02em;color:var(--spz-fg-1);margin:0;}
.spz-card-desc{color:var(--spz-fg-3);font-size:12px;}
.spz-card{background:var(--spz-surface-1);border:1px solid var(--spz-line);border-radius:var(--spz-radius-3);padding:16px;box-shadow:var(--spz-shadow-1);}
.spz-btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:32px;padding:0 12px;border:1px solid var(--spz-line);border-radius:var(--spz-radius-3);background:var(--spz-surface-2);color:var(--spz-fg-1);font-family:var(--spz-font-body);font-weight:500;font-size:13px;cursor:pointer;user-select:none;white-space:nowrap;transition:background var(--spz-dur-2) var(--spz-ease-out);}
.spz-btn:hover{background:var(--spz-surface-3);}
.spz-btn[data-variant="primary"]{background:var(--spz-orange);border-color:var(--spz-orange);color:#0A0A0A;font-weight:600;}
.spz-btn[data-variant="primary"]:hover{background:#ff7a26;box-shadow:var(--spz-shadow-glow-soft);}
.spz-btn[data-variant="ghost"]{background:transparent;border-color:transparent;color:var(--spz-fg-2);}
.spz-btn[data-variant="ghost"]:hover{background:var(--spz-surface-2);color:var(--spz-fg-1);}
.spz-btn[data-variant="outline"]{background:transparent;border-color:var(--spz-line);}
.spz-btn[data-variant="outline"]:hover{background:var(--spz-surface-1);}
.spz-btn[data-size="icon"]{width:32px;height:32px;padding:0;}
.spz-input{width:100%;height:32px;padding:0 10px;background:var(--spz-surface-1);border:1px solid var(--spz-line);border-radius:var(--spz-radius-3);color:var(--spz-fg-1);font-family:var(--spz-font-body);font-size:13px;}
.spz-input::placeholder{color:var(--spz-fg-3);}
.spz-input:focus{outline:none;border-color:var(--spz-orange);background:var(--spz-surface-2);}
.spz-input-group{display:flex;flex-direction:column;gap:6px;}
.spz-label{font-family:var(--spz-font-mono);font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--spz-fg-3);}
</style>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/preact@latest/dist/preact.min.js"></script>
<script src="https://unpkg.com/preact@latest/hooks/dist/hooks.umd.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script type="text/babel">
/** @jsx h */
const { h, render, Fragment } = preact;
const { useState, useEffect, useRef } = preactHooks;

function Icon({ name, size = 14, strokeWidth = 1.75, ...rest }) {
  const ref = useRef(null);
  useEffect(() => {
    if (window.lucide && ref.current) window.lucide.createIcons({ nameAttr: 'data-lucide', icons: window.lucide.icons, attrs: {} });
  }, [name]);
  return <i ref={ref} data-lucide={name} style={{ width: size, height: size, display: 'inline-flex', strokeWidth }} {...rest} />;
}
function Button({ variant = 'default', size = 'default', icon, children, ...rest }) {
  return (
    <button className="spz-btn" data-variant={variant} data-size={size} {...rest}>
      {icon && <Icon name={icon} size={14} />}{children}
    </button>
  );
}
function Input(props) { return <input className="spz-input" {...props} />; }
function Field({ label, children }) {
  return (
    <div className="spz-input-group">
      {label && <label className="spz-label">{label}</label>}
      {children}
    </div>
  );
}
function Card({ children, style, className = '', ...rest }) {
  return <div className={`spz-card ${className}`} style={style} {...rest}>{children}</div>;
}

function Nametag({ data, x, y, scale, opacity, isStatic = false }) {
  const licenseClass = data.licenseClass || 'D';
  const avatarUrl = data.avatar || "https://i.imgur.com/8NzA8m8.png";
  const style = isStatic ? {} : { left: `${x}%`, top: `${y}%`, opacity, transform: `translate(-50%, -100%) scale(${scale})`, position: 'absolute' };
  return (
    <div className={isStatic ? '' : 'nametag'} style={style}>
      <div className="nametag-card">
        <div className="bg-num">{licenseClass}</div>
        {data.banner && <img className="nametag-banner" src={data.banner} style={{ display: 'block' }} />}
        <div className="nametag-content">
          <div className="nametag-avatar-container">
            <img className="nametag-avatar" src={avatarUrl} />
            {data.isTalking && <div className="talking-indicator" style={{ display: 'block' }} />}
          </div>
          <div className="nametag-details">
            <div className="nametag-top">
              {data.crew && <span className="nametag-crew">[{data.crew}]</span>}
              <span className="nametag-name">{data.name || "Unknown"}</span>
            </div>
            <div className="nametag-bottom">
              <div className={`nametag-license license-${licenseClass}`}>{data.license || "D-5"}</div>
            </div>
          </div>
        </div>
        {data.isRacing && <div className="racing-glow" style={{ display: 'block' }} />}
      </div>
    </div>
  );
}

function Editor({ data, onSave, onCancel }) {
  const [avatar, setAvatar] = useState(data.avatar || '');
  const [banner, setBanner] = useState(data.banner || '');

  const fetchDiscord = () => {
    fetch(`https://${GetParentResourceName()}/fetchDiscord`, { method: 'POST', body: JSON.stringify({}) })
      .then(r => r.json()).then(d => { if (d.avatar) setAvatar(d.avatar); });
  };

  return (
    <div className="editor-screen active" style={{ display: 'flex' }}>
      <div className="editor-backdrop" onClick={onCancel} />
      <Card className="editor-modal">
        <div className="editor-header">
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ color: 'var(--spz-orange)', display: 'flex' }}><Icon name="pencil" size={16} /></span>
            <div>
              <h3 className="spz-card-title">Edit Nametag</h3>
              <div className="spz-card-desc">Customize your presence on track</div>
            </div>
          </div>
          <Button variant="ghost" size="icon" onClick={onCancel}><Icon name="x" size={14} /></Button>
        </div>

        <div className="editor-preview-section">
          <div className="spz-eyebrow" style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <Icon name="eye" size={12} /> Live Preview
          </div>
          <div style={{ width: 300, height: 60, position: 'relative' }}>
            <Nametag data={{ ...data, avatar, banner }} isStatic={true} />
          </div>
        </div>

        <div className="editor-form">
          <Field label="Avatar URL">
            <Input value={avatar} onInput={e => setAvatar(e.target.value)} placeholder="https://..." />
            <Button variant="outline" style={{ width: '100%', marginTop: 4 }} icon="link" onClick={fetchDiscord}>Use Discord Avatar</Button>
          </Field>
          <Field label="Banner URL">
            <Input value={banner} onInput={e => setBanner(e.target.value)} placeholder="https://..." />
          </Field>
        </div>

        <div className="editor-footer">
          <Button variant="ghost" icon="x" onClick={onCancel}>Cancel</Button>
          <Button variant="primary" icon="check" onClick={() => onSave({ avatar, banner })}>Save Changes</Button>
        </div>
      </Card>
    </div>
  );
}

function App() {
  const [worldTags, setWorldTags] = useState([]);
  const [selfTag, setSelfTag] = useState(null);
  const [editorData, setEditorData] = useState(null);

  useEffect(() => {
    const handler = (e) => {
      const { action, payload, nametags } = e.data;
      if (action === 'update') setWorldTags(nametags || []);
      else if (action === 'updateSelf') setSelfTag(payload);
      else if (action === 'clear') { setWorldTags([]); setSelfTag(null); }
      else if (action === 'openEditor') setEditorData(payload);
    };
    window.addEventListener('message', handler);
    return () => window.removeEventListener('message', handler);
  }, []);

  const save = (data) => {
    fetch(`https://${GetParentResourceName()}/saveNametag`, { method: 'POST', body: JSON.stringify(data) });
    setEditorData(null);
    fetch(`https://${GetParentResourceName()}/closeEditor`, { method: 'POST' });
  };
  const cancel = () => {
    setEditorData(null);
    fetch(`https://${GetParentResourceName()}/closeEditor`, { method: 'POST' });
  };

  return (
    <Fragment>
      <div id="nametag-container">
        {worldTags.map(tag => <Nametag key={tag.id} {...tag} />)}
      </div>
      {selfTag && (
        <div id="self-nametag-container">
          <Nametag data={selfTag} isStatic={true} />
        </div>
      )}
      {editorData && <Editor data={editorData} onSave={save} onCancel={cancel} />}
    </Fragment>
  );
}

render(<App />, document.getElementById('root'));
</script>
</body>
</html>
